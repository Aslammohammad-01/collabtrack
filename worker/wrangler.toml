name = "collabtrack-worker"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# KV binding — add this after creating KV namespace in dashboard
# Settings > KV Namespace Bindings > Add:
#   Variable name : COLLABTRACK_KV
#   KV Namespace  : collabtrack-kv
#
# Secrets — add via dashboard Settings > Environment Variables (Encrypted):
#   AUTH_PASSWORD  = your login password
#   JWT_SECRET     = random 48-char string
